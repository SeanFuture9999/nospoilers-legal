<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>NoSpoilers - Legal</title>
    <style>
        * {
            margin: 0;

            box-sizing: border-box;

        body {

            border-radius: 6px;
            text-decoration: none;
            color: #333;

        .links a:hover {

        .links .desc {
